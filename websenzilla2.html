<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Perfil Fortnite</title>
  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      margin: 30px;
      line-height: 1.3;
      color: #111;
    }

    header h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      font-weight: bold;
    }

    .intro {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .profile {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .profile img {
      width: 320px;
      height: auto;
      border: 6px solid #eee;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-radius: 4px;
    }

    .content {
      max-width: 700px;
    }

    h2 {
      font-size: 20px;
      margin: 18px 0 8px;
    }

    ul {
      margin-top: 0;
      margin-bottom: 18px;
    }

    a.social {
      text-decoration: none;
      color: #6a3bd6;
    }

    /* Responsive: mueve la imagen arriba en pantallas pequeñas */
    @media (max-width: 640px) {
      .profile {
        flex-direction: column;
        align-items: center;
      }
      .profile img {
        width: 90%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Fortnite — Perfil</h1>
  </header>

  <main class="content">
    <p class="intro">Hola, soy un skin legendario. ¡Listo para construir y luchar!</p>

    <div class="profile">
      <!-- Reemplaza 'fortnite.jpg' por la ruta o URL de la imagen que quieras usar -->
      <img src="fortnite.jpg" alt="Imagen de Fortnite - reemplaza por tu imagen" />

      <div>
        <h2>Algunas de mis ubicaciones favoritas:</h2>
        <ul>
          <li>Ciudad Neón</li>
          <li>Isla Volcánica</li>
          <li>Campamento del Botín</li>
        </ul>

      </div>
    </div>

    <footer>
      <small>Imagen: sustituye por una imagen de Fortnite que tengas permiso de usar.</small>
    </footer>
  </main>
</body>
</html>
